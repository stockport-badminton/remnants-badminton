name: Scrape Fixtures

on:
  # Run once daily at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape

      - name: Commit updated fixtures
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/fixtures.json
          # Only commit if something actually changed
          git diff --cached --quiet && echo "No fixture changes." || \
            git commit -m "chore: update fixtures [skip netlify]"

      - name: Push
        # push only if a commit was made
        run: |
          git diff HEAD~1 HEAD --quiet 2>/dev/null && echo "Nothing to push." || git push
